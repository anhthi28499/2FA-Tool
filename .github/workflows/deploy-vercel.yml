# CD: deploy thư mục dist lên Vercel (production).
# Secrets cần có trên GitHub: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (xem README mục CI/CD).
name: Deploy (Vercel)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install, test, and build
        run: npm ci && npm run test:run && npm run build

      # Token phải có trong GitHub Secrets; deploy qua Vercel UI không tự tạo secret này.
      - name: Check Vercel token is configured
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing VERCEL_TOKEN. GitHub: Settings → Secrets and variables → Actions → New repository secret. Create a token at https://vercel.com/account/tokens"
            exit 1
          fi

      - name: Deploy dist to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # CLI đọc VERCEL_TOKEN từ env (ổn định hơn --token trong CI).
        run: npx vercel@latest deploy dist --prod --yes
